# Kani Smart Router – Configuration (CLI Proxy-centric)
# ------------------------------------------
# Env vars: use ${VAR_NAME} syntax for secrets.

host: "0.0.0.0"
port: 18420

default_provider: cliproxy
default_profile: auto

# ---------------------------------------------------------------------------
# LLM Classifier (escalation when rules confidence < 0.7)
# ---------------------------------------------------------------------------
llm_classifier:
    model: "gpt-5.3-codex-spark"
    base_url: "http://127.0.0.1:8317/v1"
    api_key: "sk-2j7cWKoqPsKseSTa1"

# ---------------------------------------------------------------------------
# Providers
# ---------------------------------------------------------------------------
providers:
    openrouter:
        name: openrouter
        base_url: "https://openrouter.ai/api/v1"
        api_key: "${OPENROUTER_API_KEY}"
    cliproxy:
        name: cliproxy
        base_url: "http://127.0.0.1:8317/v1"
        api_key: "sk-2j7cWKoqPsKseSTa1"

# ---------------------------------------------------------------------------
# Routing Profiles (all models must exist in CLI Proxy)
# ---------------------------------------------------------------------------
# Available models on cliproxy:
#   claude-3-5-haiku-20241022, claude-3-7-sonnet-20250219,
#   claude-haiku-4-5-20251001, claude-opus-4-1-20250805,
#   claude-opus-4-20250514, claude-opus-4-5-20251101, claude-opus-4-6,
#   claude-sonnet-4-20250514, claude-sonnet-4-5-20250929, claude-sonnet-4-6,
#   deepseek/deepseek-v3.2, deepseek/deepseek-v3.2-speciale,
#   glm-4.5, glm-4.5-air, glm-4.6, glm-4.7, glm-5,
#   google/gemini-3.1-flash-image-preview, google/gemini-3.1-pro-preview,
#   gpt-4o, gpt-5, gpt-5-codex, gpt-5-codex-mini, gpt-5.1, gpt-5.1-codex,
#   gpt-5.1-codex-max, gpt-5.1-codex-mini, gpt-5.2, gpt-5.2-codex,
#   gpt-5.3-codex, gpt-5.3-codex-spark, gpt-5.4,
#   openrouter/auto, x-ai/grok-4.20-beta, x-ai/grok-4.20-multi-agent-beta
# ---------------------------------------------------------------------------

profiles:
    # ── auto: balanced cost / quality ──────────────────────────────────────
    # Updated 2026-03-22: 定額モデル優先、ベンチマーク反映
    auto:
        tiers:
            SIMPLE:
                primary: "gpt-5.3-codex-spark"
                fallback:
                    - "claude-haiku-4-5-20251001"
            MEDIUM:
                primary: "claude-sonnet-4-6"
                fallback:
                    - "glm-5-turbo"
                    - "google/gemini-3.1-flash-lite-preview"
            COMPLEX:
                primary: "claude-opus-4-6"
                fallback:
                    - "gpt-5.4"
                    - "glm-5"
                    - "google/gemini-3.1-pro-preview"
            REASONING:
                primary: "claude-opus-4-6"
                fallback:
                    - "gpt-5.4"
                    - "google/gemini-3.1-pro-preview"

    # ── eco: cheapest viable models (定額優先) ─────────────────────────────
    # Updated 2026-03-22: 定額モデル優先、GLM-4.7へ更新
    eco:
        tiers:
            SIMPLE:
                primary: "glm-4.7"
                fallback:
                    - "claude-3-5-haiku-20241022"
                    - "glm-4.5-air"
                provider: default
            MEDIUM:
                primary: "glm-4.7"
                fallback:
                    - "claude-haiku-4-5-20251001"
                    - "deepseek/deepseek-v3.2"
                provider: default
            COMPLEX:
                primary: "claude-sonnet-4-6"
                fallback:
                    - "deepseek/deepseek-v3.2"
                    - "glm-4.7"
                provider: default
            REASONING:
                primary: "claude-sonnet-4-6"
                fallback:
                    - "deepseek/deepseek-v3.2-speciale"
                    - "glm-4.7"
                provider: default

    # ── premium: best quality models (定額優先) ──────────────────────────────
    # Updated 2026-03-22: 定額モデル優先、ベンチマーク反映
    premium:
        tiers:
            SIMPLE:
                primary: "claude-sonnet-4-6"
                fallback:
                    - "gpt-5.3-codex"
                    - "glm-4.7"
                provider: default
            MEDIUM:
                primary: "claude-sonnet-4-6"
                fallback:
                    - "gpt-5.3-codex"
                    - "gpt-5"
                provider: default
            COMPLEX:
                primary: "claude-opus-4-6"
                fallback:
                    - "gpt-5.3-codex"
                    - model: "google/gemini-3.1-pro-preview"
                      provider: openrouter
                provider: default
            REASONING:
                primary: "claude-opus-4-6"
                fallback:
                    - "gpt-5.3-codex"
                    - model: "x-ai/grok-4.20-beta"
                      provider: openrouter
                provider: default

    # ── compress: fixed cheap/fast model for summarisation ────────────────
    compress:
        tiers:
            SIMPLE:
                primary: "google/gemini-3.1-flash-lite-preview"
                fallback:
                    - "gpt-5"
            MEDIUM:
                primary: "google/gemini-3.1-flash-lite-preview"
                fallback:
                    - "gpt-5"
            COMPLEX:
                primary: "google/gemini-3.1-flash-lite-preview"
                fallback:
                    - "gpt-5"
            REASONING:
                primary: "google/gemini-3.1-flash-lite-preview"
                fallback:
                    - "gpt-5"

    # ── agentic: optimized for tool use / function calling (定額優先) ──────
    # Updated 2026-03-22: 定額モデル優先、ベンチマーク反映
    agentic:
        tiers:
            SIMPLE:
                primary: "claude-haiku-4-5-20251001"
                fallback:
                    - "gpt-5-codex-mini"
                    - "glm-4.7"
                provider: default
            MEDIUM:
                primary: "claude-sonnet-4-6"
                fallback:
                    - "gpt-5.3-codex"
                    - "gpt-5-codex"
                provider: default
            COMPLEX:
                primary: "claude-sonnet-4-6"
                fallback:
                    - "gpt-5.3-codex"
                    - "claude-opus-4-6"
                provider: default
            REASONING:
                primary: "claude-opus-4-6"
                fallback:
                    - "gpt-5.3-codex"
                    - model: "x-ai/grok-4.20-multi-agent-beta"
                      provider: openrouter
                provider: default
